<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Ausfüllhilfe Freitext</title>
<style>
:root{--bg:#f7f4ef;--card:#fff;--text:#2d2d2d;--muted:#6f6f6f;--accent:#8fae9f;--accent-dark:#6f9383;--border:#e3ddd3;--soft:#f1ede6;--warning:#9a5b00}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}header{text-align:center;padding:28px 20px 10px}h1{margin:0;font-size:28px}main{max-width:1600px;margin:auto;padding:20px;display:grid;gap:20px}.kartenbereich{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;align-items:start}.card,.bericht-card{background:var(--card);border:1px solid var(--border);border-radius:18px;box-shadow:0 8px 22px #0000000a;overflow:hidden}.bericht-card{padding:18px}summary{cursor:pointer;list-style:none;padding:18px;font-weight:bold;font-size:20px;display:flex;justify-content:space-between;gap:12px}summary::-webkit-details-marker{display:none}summary:after{content:'öffnen';font-size:13px;font-weight:400;color:var(--muted);background:var(--soft);padding:5px 10px;border-radius:999px}details[open] summary:after{content:'schließen'}.card-content{padding:0 18px 18px;border-top:1px solid var(--border)}.hint{color:var(--muted);font-size:14px;margin:12px 0 14px}.warning{display:none;color:var(--warning);background:#fff6e5;border:1px solid #f1d8a8;border-radius:12px;padding:10px 12px;font-size:14px;margin:12px 0}label{display:block;font-weight:bold;margin:12px 0 6px}.check{display:flex;gap:12px;font-weight:400;background:var(--soft);padding:10px 12px;border-radius:12px;margin:8px 0;cursor:pointer}.check input{width:22px;height:22px;flex-shrink:0;accent-color:var(--accent-dark)}select,input,textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;font-size:15px;background:#fff;font-family:Arial,sans-serif}textarea{min-height:76px;resize:vertical}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.bericht{min-height:520px;white-space:pre-wrap;background:#fbfaf7;border:1px solid var(--border);border-radius:14px;padding:16px;font-size:16px}.actions{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}button{border:0;border-radius:999px;padding:10px 16px;font-size:15px;font-weight:bold;cursor:pointer;background:var(--accent);color:#fff}button:hover{background:var(--accent-dark)}button.secondary{background:#ded6ca;color:var(--text)}button.secondary:hover{background:#cfc5b7}@media(max-width:1100px){.kartenbereich{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:700px){.kartenbereich,.row{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><h1>Ausfüllhilfe Freitext</h1></header>
<main>
<section id="karten" class="kartenbereich"></section>
<aside class="bericht-card">
<h2>Gesamtbericht</h2>
<div id="bericht" class="bericht">Noch keine Eingaben vorhanden.</div>
<div id="copyFallback" class="warning">Kopieren wurde vom Browser blockiert. Bitte manuell kopieren.</div>
<div class="actions"><button id="copyBtn" type="button">Bericht kopieren</button><button id="resetBtn" type="button" class="secondary">Eingaben löschen</button></div>
</aside>
</main>
<script>
const $=id=>document.getElementById(id), br=String.fromCharCode(10), karten=$('karten'), bericht=$('bericht'), warn=$('copyFallback');
const opt=a=>a.map(x=>Array.isArray(x)?`<option value="${x[1]}">${x[0]}</option>`:`<option value="${x}">${x}</option>`).join('');
const feld=f=>{
 if(f.type==='text')return `<label for="${f.id}">${f.l}</label><input id="${f.id}" type="text" placeholder="${f.p||''}">`;
 if(f.type==='area')return `<label for="${f.id}">${f.l}</label><textarea id="${f.id}" placeholder="${f.p||'Eigene Ergänzung ...'}"></textarea>`;
 if(f.type==='check')return `<label>${f.l}</label>`+f.o.map(x=>`<label class="check"><input type="checkbox" class="${f.c}" value="${x[1]}"> ${x[0]}</label>`).join('');
 if(f.type==='html')return f.html;
 return `<label for="${f.id}">${f.l}</label><select id="${f.id}">${opt(f.o)}</select>`;
};
const card=(t,items,open=false)=>`<details class="card" ${open?'open':''}><summary>${t}</summary><div class="card-content">${items.map(feld).join('')}</div></details>`;
const bitte=[['Bitte auswählen','']];

['0. Begrüßung und Abschluss',[
{type:'html',html:'<p class="hint">Diese Auswahl bildet den Anfang und das Ende der fertigen Nachricht.</p>'},

{id:'abschlussfrage',l:'Abschlussfrage',o:[['Keine Abschlussfrage',''],['Wer kann sich denn hier bereithalten?','Wer kann sich denn hier bereithalten?'],['Hier wird ein Ansprechpartner gesucht.','Hier wird ein Ansprechpartner gesucht.'],['Findet sich hier ein Ansprechpartner?','Findet sich hier ein Ansprechpartner?'],['Könnte sich hier jemand bereithalten?','Könnte sich hier jemand bereithalten?']]},
{id:'grussformel',l:'Grußformel',o:[['Keine Grußformel',''],['Liebe Grüße','Liebe Grüße'],['Herzliche Grüße','Herzliche Grüße'],['Danke euch und liebe Grüße','Danke euch und liebe Grüße']]},
{type:'text',id:'grussName',l:'Name zur Grußformel',p:'z. B. Manuela'}],true],
['1. Adressänderungen',[
{type:'html',html:'<p class="hint">Diese Angaben werden am Ende des Berichts als eigener Block ausgegeben.</p>'},
{type:'text',id:'adresseKlinik',l:'Klinik',p:'Klinik'},
{type:'html',html:'<div class="row"><div><label for="adressePlz">PLZ</label><input id="adressePlz" type="text" maxlength="5" placeholder="5 Ziffern"></div><div><label for="adresseOrt">Ort</label><input id="adresseOrt" type="text" placeholder="Ort"></div></div><div class="row"><div><label for="adresseStrasse">Straße</label><input id="adresseStrasse" type="text" placeholder="Straße"></div><div><label for="adresseHausnummer">Hausnummer</label><input id="adresseHausnummer" type="text" placeholder="Hausnummer"></div></div>'},
{id:'adresseRegion',l:'Bundesland / Kanton',o:[['Bitte auswählen',''],'Baden-Württemberg','Bayern','Berlin','Brandenburg','Bremen','Hamburg','Hessen','Mecklenburg-Vorpommern','Niedersachsen','Nordrhein-Westfalen','Rheinland-Pfalz','Saarland','Sachsen','Sachsen-Anhalt','Schleswig-Holstein','Thüringen','Burgenland','Kärnten','Niederösterreich','Oberösterreich','Salzburg','Steiermark','Tirol','Vorarlberg','Wien','Aargau','Appenzell Ausserrhoden','Appenzell Innerrhoden','Basel-Landschaft','Basel-Stadt','Bern','Freiburg','Genf','Glarus','Graubünden','Jura','Luzern','Neuenburg','Nidwalden','Obwalden','Schaffhausen','Schwyz','Solothurn','St. Gallen','Tessin','Thurgau','Uri','Waadt','Wallis','Zug','Zürich']}]],

{id:'rolle',l:'Ansprechpartner',o:bitte.concat([['Papa','papa'],['Mama','mama'],['Oma','oma'],['Freundin','freundin'],['Familienangehörige/r','familienangehoeriger'],['Hebamme','hebamme'],['Schwester','schwester'],['Ärztin','aerztin'],['Arzt','arzt'],['Frau von der Seelsorge','seelsorgerin'],['Herr von der Seelsorge','seelsorger'],['Sozialdienst','sozialdienst'],['Seelsorge / Sozialdienst','seelsorgeSozialdienst']])},
{id:'beschreibung',l:'Beschreibung',o:bitte.concat(['traurig','verzweifelt','lieb','besorgt','aufgelöst','ruhig','dankbar','nett'])},
{type:'text',id:'ansprechpartnerName',l:'Name',p:'z. B. Jenny, Frau Mai, Marta'},
{id:'gespraechsart',l:'Gesprächsart',o:[['gesprochen','gesprochen'],['am Telefon gehabt','telefon'],['Rücksprache gehalten','ruecksprache']]}],true],
['3. Lebendbilder',[
{type:'html',html:'<p class="hint">Ruhige, klare Sätze zur Situation des Kindes.</p>'},
{id:'lebendbilderGeburt',l:'Geburt / Zeitraum',o:bitte.concat([['Das Kind wurde vor einigen Tagen geboren.','Das Kind wurde vor einigen Tagen geboren.']])},
{type:'html',html:'<div class="row"><div><label for="lebendbilderSsw">SSW</label><input id="lebendbilderSsw" type="text" maxlength="4" placeholder="z. B. 24+3"></div><div><label for="lebendbilderAlterZahl">Alter</label><input id="lebendbilderAlterZahl" type="text" placeholder="z. B. 2"></div></div>'},
{id:'lebendbilderAlterEinheit',l:'Alterseinheit',o:[['Keine Altersangabe',''],'Tage','Wochen','Monate']},
{id:'lebendbilderPrognose',l:'Prognose / medizinische Situation',o:bitte.concat([['Zustand deutlich verschlechtert','Nun hat sich der Zustand des Kindes leider deutlich verschlechtert.'],['Überleben leider nicht zu erwarten','Die aktuelle Situation lässt ein Überleben des Kindes leider nicht erwarten.'],['Prognose sehr schlecht','Die Prognose ist leider sehr schlecht.'],['Überleben nach Einschätzung nicht möglich','Ein Überleben des Kindes ist nach aktueller Einschätzung leider nicht möglich.'],['Lebenserhaltende Maßnahmen sollen beendet werden','Es wurde besprochen, dass die lebenserhaltenden Maßnahmen beendet werden sollen.'],['Abschaltung der Geräte geplant','Die Abschaltung der Geräte ist für die nächste Zeit geplant.'],['Nur noch palliative Maßnahmen','Es erfolgen nur noch palliative Maßnahmen.']])},
{type:'area',id:'lebendbilderFreitext',l:'Ergänzung'}]],
['4. Einleitung',[
{type:'html',html:'<p class="hint">Sätze zur Einleitung und zum Klinikaufenthalt der Mutter.</p>'},
{id:'einleitungStatus',l:'Situation',o:bitte.concat([['Mutter ist zur Einleitung in der Klinik','Die Mutter befindet sich zur Einleitung in der Klinik.'],['Mutter wird zur Einleitung in die Klinik gehen','Die Mutter wird zur Einleitung in die Klinik gehen.'],['Dauer bis zur Geburt nicht bekannt','Wie lange es bis zur Geburt dauern wird, ist aktuell nicht bekannt.']])},

{type:'area',id:'einleitungFreitext',l:'Ergänzung'}]],
['5. Aktuelle Situation',[
{type:'html',html:'<p class="hint">Konkrete aktuelle Situation der Familie.</p>'},
{id:'situationKind',l:'Kind der Familie',o:bitte.concat([['Erstes Kind','Das Mäuschen ist das erste Kind der Familie.'],['Zweites Kind','Das Mäuschen ist das zweite Kind der Familie.'],['Drittes Kind','Das Mäuschen ist das dritte Kind der Familie.'],['Viertes Kind','Das Mäuschen ist das vierte Kind der Familie.'],['Fünftes Kind','Das Mäuschen ist das fünfte Kind der Familie.'],['Sechstes Kind','Das Mäuschen ist das sechste Kind der Familie.'],['Siebtes Kind','Das Mäuschen ist das siebte Kind der Familie.']])},
{id:'situationGeschwister',l:'Kinder an der Hand',o:bitte.concat([['Keine Kinder','0'],['Ein Kind','1'],['Zwei Kinder','2'],['Drei Kinder','3'],['Vier Kinder','4'],['Fünf Kinder','5'],['Sechs Kinder','6'],['Sieben Kinder','7']])},
{id:'mehrlinge',l:'Einling / Mehrlinge',o:[['Einling','1'],['Zwillinge','2'],['Drillinge','3'],['Mehrlinge','mehr']]},
{type:'check',l:'Patchwork / gemeinsame Kinder',c:'patchworkCheck',o:[['Für die Eltern wäre es das erste gemeinsame Kind.','erstesGemeinsames'],['Der Papa hat Kinder an der Hand.','papaKinder'],['Die Mama hat Kinder an der Hand.','mamaKinder']]},


{type:'check',l:'Sprache / Verständigung',c:'spracheCheck',o:[['Kein Deutsch','Die Eltern sprechen kein Deutsch.'],['Wenig Deutsch','Die Eltern sprechen wenig Deutsch.'],['Englisch möglich','Die Kommunikation auf Englisch ist gut möglich.'],['Kommunikation schwierig','Die Kommunikation gestaltet sich aktuell schwierig.'],['Übersetzungsprogramm funktioniert gut','Die Verständigung mit einem Übersetzungsprogramm funktioniert gut.']]},
{id:'situationStatus',l:'Aktuelle Situation',o:bitte.concat([['Eltern noch im Kreißsaal','Die Eltern sind noch im Kreißsaal.'],['Mutter noch im OP','Die Mutter ist noch im OP.'],['Mutter kommt in den OP','Die Mutter kommt demnächst in den OP.'],['Kind bereits still geboren','Das Kind wurde bereits still geboren.']])},
{type:'area',id:'situationFreitext',l:'Ergänzung',p:'Eigene Beobachtung ...'}]],
['6. Erinnerungen und Bilder',[
{type:'html',html:'<p class="hint">Wünsche rund um gemeinsame Erinnerungen und Bilder.</p>'},
{type:'check',l:'',c:'bilderCheck',o:[['Die Eltern möchten gemeinsame Erinnerungsbilder mit ihrem Kind.','Die Eltern möchten gerne gemeinsame Erinnerungsbilder mit ihrem Kind.'],['Gemeinsame Erinnerungsbilder gewünscht.','Es sind gemeinsame Erinnerungsbilder mit dem Kind gewünscht.'],['Geschwister vermutlich mit auf die Erinnerungsbilder.','Die Geschwister möchten vermutlich mit auf die Erinnerungsbilder.'],['Eltern auf Bildern unklar.','Ob die Eltern mit auf die Erinnerungsbilder möchten, ist aktuell nicht bekannt.'],['Geschwister auf Bildern unklar.','Ob die Geschwister mit auf die Erinnerungsbilder möchten, ist aktuell nicht bekannt.'],['Gemeinsame Erinnerungsbilder unklar.','Ob gemeinsame Erinnerungsbilder mit der Familie gewünscht sind, ist aktuell nicht bekannt.'],['Bilder auch morgen möglich.','Bilder sind auch morgen möglich.'],['Bilder nur heute möglich.','Bilder sind nur heute möglich.'],['Eltern möchten zeitnah nach Hause gehen.','Die Eltern möchten zeitnah nach Hause gehen.']]},
{type:'area',id:'bilderFreitext',l:'Ergänzung'}]],
['7. Wassermethode',[
{type:'html',html:'<p class="hint">Unikliniken Freiburg und Münster bitte nicht nach der Wassermethode fragen.</p><div class="hint">Anwendung Wassermethode:<br>Ein Gefäß mit kühlem Leitungswasser befüllen. Das Kind hineinlegen und kühl stellen. Bei Bedarf Wasser wechseln.</div>'},
{id:'wasserStatus',l:'Status',o:bitte.concat([['Wird angewendet','Die Wassermethode wird angewendet.'],['Wird nicht angewendet','Die Wassermethode wird nicht angewendet.'],['Weiß man noch nicht','Ob die Wassermethode angewendet wird, ist aktuell nicht bekannt.']])},
{type:'area',id:'wasserFreitext',l:'Ergänzung'}]],
['8. Infekte',[
{type:'html',html:'<p class="hint">Infekte und notwendige Schutzmaßnahmen.</p>'},
{id:'infekteStatus',l:'Status',o:bitte.concat([['Keine Infekte bekannt','Es sind keine Infekte bekannt.'],['Infekte vorhanden','Es liegen Infekte vor.'],['Unklar','Ob Infekte vorliegen, ist aktuell unklar.'],['Schutzmaßnahmen notwendig','Schutzmaßnahmen sind notwendig.']])},
{type:'html',html:'<div id="infekteBereich" style="display:none"><div class="hint">Mehrere Angaben können ausgewählt werden.</div><label>Infekte</label><label class="check"><input type="checkbox" class="infekteCheck" value="Corona"> Corona</label><label class="check"><input type="checkbox" class="infekteCheck" value="Hepatitis"> Hepatitis</label><label class="check"><input type="checkbox" class="infekteCheck" value="MRSA Krankenhauskeim"> MRSA Krankenhauskeim</label><label class="check"><input type="checkbox" class="infekteCheck" value="HIV"> HIV</label><label class="check"><input type="checkbox" class="infekteCheck" value="Influenza"> Influenza</label><label class="check"><input type="checkbox" class="infekteCheck" value="Schutzkleidung ist vorhanden."> Schutzkleidung vorhanden</label></div>'},
{type:'area',id:'infekteFreitext',l:'Ergänzung'}]],
['9. Besonderheiten',[
{type:'html',html:'<p class="hint">Äußerliche Besonderheiten und medizinische Hinweise.</p>'},
{id:'besonderheitenStatus',l:'Status',o:bitte.concat([['Keine Besonderheiten bekannt','Es sind keine äußerlichen Besonderheiten bekannt.'],['Besonderheiten vorhanden','Es liegen äußerliche Besonderheiten vor.'],['Unklar','Ob äußerliche Besonderheiten vorliegen, ist aktuell nicht bekannt.']])},
{type:'html',html:'<div id="besonderheitenBereich" style="display:none"><div class="hint">Mehrere Angaben können ausgewählt werden.</div><label>Besonderheiten</label><label class="check"><input type="checkbox" class="besonderheitenCheck" value="Klumpfüßchen"> Klumpfüßchen</label><label class="check"><input type="checkbox" class="besonderheitenCheck" value="Verkürzte Gliedmaßen"> Verkürzte Gliedmaßen</label><label class="check"><input type="checkbox" class="besonderheitenCheck" value="Lippen-Kiefer-Gaumenspalte"> Lippen-Kiefer-Gaumenspalte</label><label class="check"><input type="checkbox" class="besonderheitenCheck" value="Hydrocephalus"> Hydrocephalus <span title="Erweiterung der Hirnkammern / Wasserkopf">ⓘ</span></label><label class="check"><input type="checkbox" class="besonderheitenCheck" value="Hydrops fetalis"> Hydrops fetalis</label><label class="check"><input type="checkbox" class="besonderheitenCheck" value="Omphalozele"> Omphalozele</label><label class="check"><input type="checkbox" class="besonderheitenCheck" value="Turner-Syndrom"> Turner-Syndrom</label><label class="check"><input type="checkbox" class="besonderheitenCheck" value="Spina bifida"> Spina bifida</label><label class="check"><input type="checkbox" class="besonderheitenCheck" value="Anenzephalie"> Anenzephalie</label><label class="check"><input type="checkbox" class="besonderheitenCheck" value="Es werden Hautablösungen erwartet."> Hautablösungen erwartet</label><label class="check"><input type="checkbox" class="besonderheitenCheck" value="Allgemeine äußerliche Fehlbildungen"> Allgemeine äußerliche Fehlbildungen</label><label class="check"><input type="checkbox" class="besonderheitenCheck" value="Es liegen Fehlbildungen innerer Art vor."> Fehlbildungen innerer Art</label></div><div class="hint">Die Erklärung zur Besonderheit dient nur als interne Hilfe und erscheint nicht im Bericht.</div>'},
{type:'area',id:'besonderheitenFreitext',l:'Ergänzung'}]],
['10. Kleidung und Erinnerungsstücke',[

{type:'check',l:'',c:'kleidungCheck',o:[['Kleidung vorhanden','Kleidung ist vorhanden.'],['Kleidung nicht vorhanden','Kleidung ist nicht vorhanden.'],['Deckchen vorhanden','Deckchen sind vorhanden.'],['Deckchen nicht vorhanden','Deckchen sind nicht vorhanden.'],['Einschlagtücher vorhanden','Einschlagtücher sind vorhanden.'],['Einschlagtücher nicht vorhanden','Einschlagtücher sind nicht vorhanden.'],['Eltern bringen eine Decke mit','Die Eltern bringen eine Decke mit.'],['Eltern bringen Erinnerungsstücke mit','Die Eltern bringen Erinnerungsstücke mit.'],['Eltern bringen Kuscheltiere mit','Die Eltern bringen Kuscheltiere mit.'],['Eltern bringen Kleidung mit','Die Eltern bringen eigene Kleidung für ihr Kind mit.']]},
{type:'area',id:'kleidungFreitext',l:'Ergänzung'}]]
];
karten.innerHTML=cards.map(c=>card(c[0],c[1],c[2])).join('');
const val=id=>$(id)?.value||'', txt=id=>val(id).trim(), punct=s=>!s?'':(/[.!?]$/.test(s.trim())?s.trim():s.trim()+'.');

const joinUnd=a=>a.length<2?a[0]||'':a.slice(0,-1).join(', ')+' und '+a.at(-1);
const rollen={papa:['dem','den','Papa','privat'],mama:['der','die','Mama','privat'],oma:['der','die','Oma','privat'],freundin:['der','die','Freundin','privat'],familienangehoeriger:['einem','einen','Familienangehörigen','familie'],hebamme:['','','Hebamme','beruf'],schwester:['','','Schwester','beruf'],aerztin:['die','','Ärztin','medizin'],arzt:['den','','Arzt','medizin'],seelsorgerin:['','','Frau','seelsorge'],seelsorger:['','','Herr','seelsorge'],sozialdienst:['','','Sozialdienst','sozial'],seelsorgeSozialdienst:['','','Seelsorge / Sozialdienst','seelsoz']};
function ansprechpartner(){let r=val('rolle'),d=rollen[r],b=val('beschreibung'),n=txt('ansprechpartnerName'),g=val('gespraechsart');if(!d)return'';let telefon=g==='telefon',mit=g!=='telefon';let endung='';if(b){if(d[3]==='privat'||d[3]==='familie'){endung=telefon?'e ':'en '}else endung=' '}let adj=b?b+endung:'';let name=n?' '+n:'';if(d[3]==='privat')return telefon?`Ich habe ${d[1]} ${adj}${d[2]}${name} am Telefon.`:g==='ruecksprache'?`Ich habe mit ${d[0]} ${adj}${d[2]}${name} Rücksprache gehalten.`:`Ich habe mit ${d[0]} ${adj}${d[2]}${name} gesprochen.`;if(d[3]==='familie')return telefon?`Ich habe ${d[1]} ${adj}${d[2]} am Telefon.`:g==='ruecksprache'?`Ich habe mit ${d[0]} ${adj}${d[2]} Rücksprache gehalten.`:`Ich habe mit ${d[0]} ${adj}${d[2]} gesprochen.`;if(d[3]==='medizin'){let besch=b?b+' ':'';return telefon?`Ich habe ${d[0]} ${besch}${d[2]}${name} am Telefon.`:g==='ruecksprache'?`Ich habe mit ${d[0]} ${besch}${d[2]}${name} Rücksprache gehalten.`:`Ich habe mit ${d[0]} ${besch}${d[2]}${name} gesprochen.`}if(d[3]==='sozial'){let besch=b?b+' ':'';return telefon?(n?`Ich habe ${besch}${n} vom Sozialdienst am Telefon.`:`Ich habe den ${besch}Sozialdienst am Telefon.`):g==='ruecksprache'?(n?`Ich habe mit ${besch}${n} vom Sozialdienst Rücksprache gehalten.`:`Ich habe mit dem ${besch}Sozialdienst Rücksprache gehalten.`):(n?`Ich habe mit ${besch}${n} vom Sozialdienst gesprochen.`:`Ich habe mit dem ${besch}Sozialdienst gesprochen.`)}if(d[3]==='seelsorge'){let artikel=d[2]==='Herr'?'dem':'der';let titel=d[2]==='Herr'?'Herrn':'Frau';let adj=b?(b.endsWith('g')?b+'en ':b+'en '):'';let p=`${artikel} ${adj}${titel}${n?' '+n:''} von der Seelsorge`;return telefon?`Ich habe ${p} am Telefon.`:g==='ruecksprache'?`Ich habe mit ${p} Rücksprache gehalten.`:`Ich habe mit ${p} gesprochen.`}if(d[3]==='seelsoz'){let a=b?b+' ':'';let p=n?a+n:a+d[2];return telefon?`Ich habe ${p} am Telefon.`:g==='ruecksprache'?`Ich habe mit ${p} Rücksprache gehalten.`:`Ich habe mit ${p} gesprochen.`}let besch=b?b+' ':'';return telefon?`Ich habe ${besch}${d[2]}${name} am Telefon.`:g==='ruecksprache'?`Ich habe mit ${besch}${d[2]}${name} Rücksprache gehalten.`:`Ich habe mit ${besch}${d[2]}${name} gesprochen.`}
function adresse(){let f=[['Klinik',txt('adresseKlinik')],['PLZ',txt('adressePlz')],['Ort',txt('adresseOrt')],['Straße',txt('adresseStrasse')],['Hausnummer',txt('adresseHausnummer')],['Bundesland/Kanton',val('adresseRegion')]].filter(x=>x[1]);return f.length?['Adressänderung',...f.map(x=>x[0]+': '+x[1])].join(br):''}
function lebend(){let t=[],ssw=txt('lebendbilderSsw'),az=txt('lebendbilderAlterZahl'),ae=val('lebendbilderAlterEinheit');if(val('lebendbilderGeburt'))t.push(val('lebendbilderGeburt'));if(ssw&&az&&ae)t.push(`Das Kind wurde in der ${ssw}. SSW geboren und ist ${az} ${ae} alt.`);else{if(ssw)t.push(`Das Kind wurde in der ${ssw}. SSW geboren.`);if(az&&ae)t.push(`Das Kind ist ${az} ${ae} alt.`)}if(val('lebendbilderPrognose'))t.push(val('lebendbilderPrognose'));if(txt('lebendbilderFreitext'))t.push(punct(txt('lebendbilderFreitext')));return t.join(' ')}
function einleitung(){let s=val('einleitungStatus'),d=txt('einleitungDatum'),tage=txt('einleitungTage'),t=[];if(s==='Die Mutter befindet sich zur Einleitung in der Klinik.')t.push(tage?`Die Mutter ist seit ${tage} Tagen zur Einleitung in der Klinik.`:d?`Die Mutter ist seit ${d} zur Einleitung in der Klinik.`:s);else if(s==='Die Mutter wird zur Einleitung in die Klinik gehen.')t.push(d?`Die Mutter wird am ${d} zur Einleitung in die Klinik gehen.`:tage?`Die Mutter wird in ${tage} Tagen zur Einleitung in die Klinik gehen.`:s);else if(s)t.push(s);if(txt('einleitungFreitext'))t.push(punct(txt('einleitungFreitext')));return t.join(' ')}
function sprache(){let a=checked('.spracheCheck');if(a.includes('Die Eltern sprechen kein Deutsch.')&&a.includes('Die Kommunikation auf Englisch ist gut möglich.'))return'Die Eltern sprechen kein Deutsch, die Kommunikation auf Englisch ist jedoch gut möglich.';if(a.includes('Die Eltern sprechen kein Deutsch.')&&a.includes('Die Verständigung mit einem Übersetzungsprogramm funktioniert gut.'))return'Die Eltern sprechen kein Deutsch, die Verständigung mit einem Übersetzungsprogramm funktioniert gut.';if(a.includes('Die Eltern sprechen wenig Deutsch.')&&a.includes('Die Kommunikation gestaltet sich aktuell schwierig.'))return'Die Eltern sprechen wenig Deutsch, wodurch sich die Kommunikation aktuell schwierig gestaltet.';if(a.includes('Die Eltern sprechen wenig Deutsch.')&&a.includes('Die Kommunikation auf Englisch ist gut möglich.'))return'Die Eltern sprechen wenig Deutsch, die Kommunikation auf Englisch ist jedoch gut möglich.';return a.join(' ')}
function kinderText(){let k=val('situationKind'),h=val('situationGeschwister'),m=val('mehrlinge');let hand=['keine Kinder','ein Kind','zwei Kinder','drei Kinder','vier Kinder','fünf Kinder','sechs Kinder','sieben Kinder'];let ord=['erste','zweite','dritte','vierte','fünfte','sechste','siebte','achte','neunte','zehnte'];if(!h)return k;if(m==='2'){let n=Number(h);if(n===0)return'Für die Eltern wären die Zwillinge die ersten Kinder.';return'Die Familie hat bereits '+hand[n]+' an der Hand, mit den Zwillingen wären es '+hand[n+2]+'.'}if(m==='3'){let n=Number(h);if(n===0)return'Für die Eltern wären die Drillinge die ersten Kinder.';return'Die Familie hat bereits '+hand[n]+' an der Hand, mit den Drillingen wären es '+hand[n+3]+'.'}if(m==='mehr'){let n=Number(h);return n===0?'Für die Eltern wären es die ersten Kinder.':'Die Familie hat bereits '+hand[n]+' an der Hand, mit den Mehrlingen kämen weitere Kinder dazu.'}if(k&&h!=='')return h==='0'?k:'Die Familie hat bereits '+hand[Number(h)]+' an der Hand, das Mäuschen wäre das '+ord[Number(h)]+' Kind.';return k}
function patchwork(){let a=checked('.patchworkCheck'),t=[];if(a.includes('papaKinder')&&!a.includes('erstesGemeinsames'))t.push('Der Papa hat Kinder an der Hand.');if(a.includes('mamaKinder')&&!a.includes('erstesGemeinsames'))t.push('Die Mama hat Kinder an der Hand.');if(a.includes('erstesGemeinsames')&&a.includes('papaKinder')&&!a.includes('mamaKinder'))t.push('Der Papa hat bereits Kinder an der Hand, für die Eltern wäre es das erste gemeinsame Kind.');else if(a.includes('erstesGemeinsames')&&a.includes('mamaKinder')&&!a.includes('papaKinder'))t.push('Die Mama hat bereits Kinder an der Hand, für die Eltern wäre es das erste gemeinsame Kind.');else if(a.includes('erstesGemeinsames')&&a.includes('mamaKinder')&&a.includes('papaKinder'))t.push('Für die Eltern wäre es das erste gemeinsame Kind.');return t.join(' ')}
function situation(){return [kinderText(),patchwork(),sprache(),textFreitext('situationStatus','situationFreitext')].filter(Boolean).join(' ')}
function textFreitext(a,b){return [val(a),punct(txt(b))].filter(Boolean).join(' ')}
function infekte(){let s=val('infekteStatus'),a=checked('.infekteCheck'),frei=punct(txt('infekteFreitext')),schutz='Schutzkleidung ist vorhanden.';if(!s)return'';if(s!=='Es liegen Infekte vor.')return[s,frei].filter(Boolean).join(' ');let reine=a.filter(x=>x!==schutz),t=[];if(reine.length)t.push('Es liegen folgende Infekte vor:'+br+'- '+reine.join(br+'- '));if(a.includes(schutz))t.push(schutz);if(frei)t.push(frei);return t.join(br+br)}
function besonderheiten(){let s=val('besonderheitenStatus'),a=checked('.besonderheitenCheck'),frei=punct(txt('besonderheitenFreitext')),sonder=['Allgemeine äußerliche Fehlbildungen','Es werden Hautablösungen erwartet.','Es liegen Fehlbildungen innerer Art vor.'],t=[];if(a.includes(sonder[0]))t.push('Es liegen allgemeine äußerliche Fehlbildungen vor.');if(a.includes(sonder[1]))t.push(sonder[1]);if(a.includes(sonder[2]))t.push(sonder[2]);let normal=a.filter(x=>!sonder.includes(x));if(normal.length)t.push('Folgende Besonderheiten liegen vor:'+br+'- '+normal.join(br+'- '));else if(s)t.push(s);if(frei)t.push(frei);return t.join(br+br)}
function kleidung(){let a=checked('.kleidungCheck'),frei=punct(txt('kleidungFreitext')),v=[],nv=[],t=[],mitbringen=[];if(a.includes('Kleidung ist vorhanden.'))v.push('Kleidung');if(a.includes('Deckchen sind vorhanden.'))v.push('Deckchen');if(a.includes('Einschlagtücher sind vorhanden.'))v.push('Einschlagtücher');if(a.includes('Kleidung ist nicht vorhanden.'))nv.push('Kleidung');if(a.includes('Deckchen sind nicht vorhanden.'))nv.push('Deckchen');if(a.includes('Einschlagtücher sind nicht vorhanden.'))nv.push('Einschlagtücher');if(v.length)t.push(v.length===1&&v[0]==='Kleidung'?'Kleidung ist vorhanden.':joinUnd(v)+' sind vorhanden.');if(nv.length)t.push(nv.length===1&&nv[0]==='Kleidung'?'Kleidung ist nicht vorhanden.':joinUnd(nv)+' sind nicht vorhanden.');if(a.includes('Die Eltern bringen eine Decke mit.'))mitbringen.push('eine Decke');if(a.includes('Die Eltern bringen Erinnerungsstücke mit.'))mitbringen.push('Erinnerungsstücke');if(a.includes('Die Eltern bringen Kuscheltiere mit.'))mitbringen.push('Kuscheltiere');if(a.includes('Die Eltern bringen eigene Kleidung für ihr Kind mit.'))mitbringen.push('eigene Kleidung für ihr Kind');if(mitbringen.length)t.push('Die Eltern bringen '+joinUnd(mitbringen)+' mit.');if(frei)t.push(frei);return t.join(' ')}
function update(){let leb=lebend(),out=[];$('infekteBereich').style.display=val('infekteStatus')==='Es liegen Infekte vor.'?'block':'none';$('besonderheitenBereich').style.display=val('besonderheitenStatus')==='Es liegen äußerliche Besonderheiten vor.'?'block':'none';if(val('begruessung'))out.push(val('begruessung'));else if(leb)out.push('Hallo,');if(leb)out.push('Hier geht es um Lebendbilder, es eilt.');[ansprechpartner(),leb,einleitung(),situation(),[checked('.bilderCheck').join(' '),punct(txt('bilderFreitext'))].filter(Boolean).join(' '),textFreitext('wasserStatus','wasserFreitext'),infekte(),besonderheiten(),kleidung(),adresse(),val('abschlussfrage')].filter(Boolean).forEach(x=>out.push(x));if(val('grussformel'))out.push(txt('grussName')?val('grussformel')+', '+txt('grussName'):val('grussformel'));bericht.textContent=out.length?out.join(br+br):'Noch keine Eingaben vorhanden.'}
document.addEventListener('input',e=>{if(e.target.id==='adressePlz')e.target.value=e.target.value.replace(/[^0-9]/g,'').slice(0,5);if(e.target.id==='lebendbilderSsw')e.target.value=e.target.value.replace(/[^0-9+]/g,'').slice(0,4);if(e.target.id==='einleitungTage')e.target.value=e.target.value.replace(/[^0-9]/g,'');update()});
document.addEventListener('change',update);

$('resetBtn').onclick=()=>{document.querySelectorAll('input,textarea,select').forEach(e=>e.type==='checkbox'?e.checked=false:e.value='');$('gespraechsart').value='gesprochen';warn.style.display='none';update()};
update();
